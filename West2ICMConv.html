<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarMapper: Precision Slider</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; background: #eceff1; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #263238; margin-top: 0; text-align: center; }
        
        .slider-section { margin: 30px 0; text-align: center; background: #f8f9fa; padding: 25px; border-radius: 12px; position: relative; }
        .current-sa-label { font-size: 0.8rem; color: #78909c; text-transform: uppercase; font-weight: bold; }
        .current-sa-note { font-size: 3rem; font-weight: 900; color: #d32f2f; margin: 5px 0 15px 0; }
        
        /* Slider Wrapper for alignment */
        .range-container { position: relative; width: 100%; padding: 0 10px; box-sizing: border-box; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; margin: 0; }
        input[type=range]::-webkit-slider-runnable-track { height: 8px; background: #cfd8dc; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #263238; margin-top: -8px; border: 2px solid #fff; position: relative; z-index: 2; }

        /* Tick Labels */
        .sliderticks { display: flex; justify-content: space-between; padding: 0 10px; margin-top: 10px; }
        .sliderticks span { font-size: 0.7rem; color: #90a4ae; font-weight: bold; width: 20px; text-align: center; position: relative; }

        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #90a4ae; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #f1f1f1; }
        
        .swara-col { font-weight: 800; color: #263238; font-size: 1.1rem; }
        .note-col { font-weight: 600; color: #1976d2; font-family: 'Monaco', monospace; font-size: 1.1rem; }
        .desc-col { color: #b0bec5; font-size: 0.8rem; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>SwarMapper</h2>
    
    <div class="slider-section">
        <div class="current-sa-label">Selected Root (Sa)</div>
        <div id="saDisplay" class="current-sa-note">C</div>
        
        <div class="range-container">
            <input type="range" id="scaleSlider" min="0" max="11" value="0" step="1" oninput="updateMapping()">
            <div class="sliderticks" id="tickContainer">
                <!-- Ticks added via JS -->
            </div>
        </div>
    </div>

    <table class="result-table">
        <thead>
            <tr>
                <th>SWARA</th>
                <th>WESTERN NOTE</th>
                <th>NAME</th>
            </tr>
        </thead>
        <tbody id="mappingBody"></tbody>
    </table>
</div>

<script>
    const westernNotes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    
    const swaras = [
        { s: "Sa", d: "Shadaj" },
        { s: "re", d: "Komal Rishabh" },
        { s: "Re", d: "Shuddh Rishabh" },
        { s: "ga", d: "Komal Gandhar" },
        { s: "Ga", d: "Shuddh Gandhar" },
        { s: "ma", d: "Shuddh Madhyam" },
        { s: "Ma", d: "Teevra Madhyam" },
        { s: "Pa", d: "Pancham" },
        { s: "dha", d: "Komal Dhaivat" },
        { s: "Dha", d: "Shuddh Dhaivat" },
        { s: "ni", d: "Komal Nishad" },
        { s: "Ni", d: "Shuddh Nishad" }
    ];

    // Generate tick labels dynamically
    const tickContainer = document.getElementById('tickContainer');
    westernNotes.forEach(note => {
        const span = document.createElement('span');
        span.innerText = note.replace("#", "♯"); // Prettier sharp symbol
        tickContainer.appendChild(span);
    });

    function updateMapping() {
        const sliderVal = parseInt(document.getElementById('scaleSlider').value);
        const saDisplay = document.getElementById('saDisplay');
        const body = document.getElementById('mappingBody');
        
        saDisplay.innerText = westernNotes[sliderVal];
        body.innerHTML = "";

        swaras.forEach((swara, index) => {
            let westernIndex = (sliderVal + index) % 12;
            let currentNote = westernNotes[westernIndex];

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="swara-col">${swara.s}</td>
                <td class="note-col">${currentNote}</td>
                <td class="desc-col">${swara.d}</td>
            `;
            body.appendChild(row);
        });
    }

    updateMapping();
</script>

</body>
</html>
