<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full 12-Note Swara Translator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 20px; background: #eceff1; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #263238; margin-top: 0; text-align: center; }
        .controls { margin-bottom: 25px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; color: #546e7a; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #cfd8dc; font-size: 1.1rem; appearance: none; background-color: #fff; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #78909c; font-size: 0.9rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f5f5f5; font-size: 1.1rem; }
        .swara-name { font-weight: bold; color: #d32f2f; }
        .western-note { font-weight: bold; color: #1976d2; font-family: monospace; }
        .note-type { font-size: 0.85rem; color: #90a4ae; font-style: italic; }
        tr:hover { background-color: #fafafa; }
    </style>
</head>
<body>

<div class="card">
    <h2>Chromatone: Swara Mapper</h2>
    
    <div class="controls">
        <label for="rootNote">Set your 'Sa' (Root):</label>
        <select id="rootNote" onchange="translateAllNotes()">
            <option value="C">C</option>
            <option value="C#">C# / Db</option>
            <option value="D">D</option>
            <option value="D#">D# / Eb</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="F#">F# / Gb</option>
            <option value="G">G</option>
            <option value="G#">G# / Ab</option>
            <option value="A">A</option>
            <option value="A#">A# / Bb</option>
            <option value="B">B</option>
        </select>
    </div>

    <table class="result-table">
        <thead>
            <tr>
                <th>Indian Swara</th>
                <th>Western Note</th>
                <th>Type</th>
            </tr>
        </thead>
        <tbody id="outputBody">
            <!-- Table rows will be generated here -->
        </tbody>
    </table>
</div>

<script>
    const chromaticScale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    
    // Detailed mapping of all 12 intervals
    const swaraData = [
        { name: "Sa", type: "Shadaj (Root)" },
        { name: "re", type: "Komal Rishabh" },
        { name: "Re", type: "Shuddh Rishabh" },
        { name: "ga", type: "Komal Gandhar" },
        { name: "Ga", type: "Shuddh Gandhar" },
        { name: "ma", type: "Shuddh Madhyam" },
        { name: "Ma", type: "Teevra Madhyam" },
        { name: "Pa", type: "Pancham" },
        { name: "dha", type: "Komal Dhaivat" },
        { name: "Dha", type: "Shuddh Dhaivat" },
        { name: "ni", type: "Komal Nishad" },
        { name: "Ni", type: "Shuddh Nishad" }
    ];

    function translateAllNotes() {
        const root = document.getElementById('rootNote').value;
        const tableBody = document.getElementById('outputBody');
        tableBody.innerHTML = ""; 

        let rootIndex = chromaticScale.indexOf(root);

        swaraData.forEach((swara, interval) => {
            let noteIndex = (rootIndex + interval) % 12;
            let westernNote = chromaticScale[noteIndex];

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="swara-name">${swara.name}</td>
                <td class="western-note">${westernNote}</td>
                <td class="note-type">${swara.type}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    // Initialize the tool
    translateAllNotes();
</script>

</body>
</html>
